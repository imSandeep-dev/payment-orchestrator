openapi: 3.0.3
info:
  title: PayFlow Commerce — Payment Orchestration Layer
  version: 1.0.0
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
    TransactionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        state: { type: string }
        amountPaise: { type: integer }
        gateway: { type: string }
security:
  - ApiKeyAuth: []
paths:
  /api/v1/payments:
    post:
      summary: Initiate a new payment
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [merchantId, merchantOrderId, amountPaise, currency, paymentMethod]
              properties:
                merchantId: { type: string, format: uuid }
                merchantOrderId: { type: string }
                amountPaise: { type: integer }
                currency: { type: string }
                paymentMethod: { type: string, enum: [CREDIT_CARD, DEBIT_CARD, UPI, NETBANKING, WALLET] }
      responses:
        '200':
          description: Payment initiated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionResponse' }
        '409':
          description: Idempotency conflict or key reuse
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /api/v1/payments/{id}:
    get:
      summary: Retrieve payment details by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Transaction found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionResponse' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }


  # Remaining paths (same request/response conventions):
  # GET  /api/v1/payments?merchant_id&merchant_order_id
  # POST /api/v1/payments/{id}/capture
  # POST /api/v1/payments/{id}/void
  # POST /api/v1/payments/{id}/refund
  # GET  /api/v1/payments/{id}/refunds
  # GET  /api/v1/payments/{id}/timeline
  # POST /api/v1/webhooks/{razorpay|stripe|payu|upi}
  # GET  /api/v1/gateways
  # GET  /api/v1/gateways/{name}/health
  # GET  /api/v1/gateways/{name}/metrics
  # PUT  /api/v1/gateways/{name}/config
  # GET  /api/v1/routing/config
  # PUT  /api/v1/routing/config
  # POST /api/v1/reconciliation/trigger
  # GET  /api/v1/reconciliation/reports/{runId}
  # GET  /api/v1/analytics/success-rate
  # GET  /api/v1/analytics/volume
  # GET  /api/v1/health