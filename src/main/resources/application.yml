server:
  port: 8080

spring:
  application:
    name: payment-orchestrator
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:payflow_orchestrator}
    username: ${DB_USERNAME:payflow}
    password: ${DB_PASSWORD:payflow_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: ALWAYS

logging:
  level:
    root: info
    com.payflow.orchestrator: debug

app:
  webhook-secrets:
    gateways:
      razorpay: dev-razorpay-webhook-secret-change-me
      stripe: dev-stripe-webhook-secret-change-me
      payu: dev-payu-webhook-secret-change-me
      upi: dev-upi-webhook-secret-change-me
  api-keys:
    keys:
      dev-api-key-change-me: "11111111-1111-1111-1111-111111111111"